<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plan Victoria — 12 Semanas</title>
<style>
:root{
  --bg:#0a0a0a; --surface:#161616; --surface2:#1d1d1d; --surface3:#232323;
  --border:#2b2b2b; --accent:#ff4426; --accent-dim:#3a1810;
  --lime:#cdfb3f; --text:#f2f0ec; --dim:#9a9a96; --faint:#5e5e5b;
  --knee:#fb923c;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100%;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
input,textarea{font-family:inherit;}
input::placeholder,textarea::placeholder{color:var(--faint);}
.mono{font-family:'JetBrains Mono','Courier New',monospace;letter-spacing:.04em;}
.display{font-family:'Barlow Condensed',system-ui,sans-serif;text-transform:uppercase;letter-spacing:.01em;}
.scroll::-webkit-scrollbar{height:6px;width:6px;}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Layout */
#header{padding:18px;border-bottom:1px solid var(--border);}
#header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
#header-meta{font-size:11px;color:var(--faint);margin-top:6px;letter-spacing:.08em;}
#header-btns{display:flex;gap:6px;flex-wrap:wrap;}
#import-msg{margin-top:10px;padding:9px 12px;border-radius:7px;font-size:12.5px;display:none;}
#import-msg.ok{background:rgba(205,251,63,.08);border:1px solid var(--lime);color:var(--lime);display:block;}
#import-msg.err{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);display:block;}
#progress-bar-wrap{margin-top:16px;}
#progress-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
#progress-segs{display:flex;gap:4px;}
.prog-seg{flex:1;height:5px;border-radius:2px;background:var(--surface3);}
.prog-seg.done{background:var(--accent);}
#main-tabs{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
#content{padding:20px 18px 40px;}

/* Tab buttons */
.tab-btn{flex:1;min-width:90px;padding:11px 16px;border-radius:8px;font-size:14px;font-weight:600;
  border:1px solid var(--border);background:var(--surface);color:var(--dim);transition:all .15s;}
.tab-btn.active{border-color:var(--text);background:var(--text);color:#0a0a0a;}

/* Week selector */
#week-selector{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;}
.week-btn{min-width:44px;padding:9px 0;border-radius:7px;font-size:13px;font-weight:700;
  border:1px solid var(--border);background:var(--surface);color:var(--dim);transition:all .15s;}
.week-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;}

/* Block card */
#block-card{background:var(--surface);border-left:3px solid var(--accent);border-radius:8px;padding:14px 16px;margin-bottom:18px;}
#block-label{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
#block-focus{font-size:14.5px;color:var(--text);}

/* Day tabs */
#day-tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:18px;padding-bottom:2px;}
.day-btn{padding:9px 16px;border-radius:7px;white-space:nowrap;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);
  color:var(--dim);transition:all .15s;}
.day-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;}
.day-dot{width:6px;height:6px;border-radius:50%;background:var(--faint);flex-shrink:0;}
.day-btn.active .day-dot{background:#fff;}

/* Session */
#session-badge{display:flex;justify-content:flex-end;margin-bottom:10px;}
.badge{display:inline-block;padding:4px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.badge-accent{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);}
.badge-upper{background:rgba(205,251,63,.08);color:var(--lime);border:1px solid var(--lime);}
.badge-leg{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);}
#session-title{font-size:26px;font-weight:700;line-height:1.1;margin-bottom:16px;}
.coach-note{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:13.5px;line-height:1.6;}
.coach-note strong{color:var(--lime);}

/* Phase labels */
.phase-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--faint);margin-bottom:8px;font-weight:600;}
.warmup-list{font-size:13.5px;line-height:1.6;color:var(--dim);padding-left:18px;margin-bottom:18px;}
.phase-d{padding:12px 14px;background:var(--surface);border-radius:8px;font-size:12.5px;
  color:var(--dim);border-left:3px solid var(--accent);margin-top:6px;}
.phase-d strong{color:var(--text);}

/* Exercise card */
.ex-card{background:var(--surface);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.ex-card.knee{border:1px solid rgba(251,146,60,.4);}
.ex-card.normal{border:1px solid var(--border);}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.ex-name{font-weight:700;font-size:15.5px;color:var(--text);display:flex;align-items:center;gap:8px;}
.ex-pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{display:inline-block;padding:4px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--dim);}
.pill-accent{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.ex-rest{font-size:12.5px;color:var(--dim);}
.ex-note-knee{font-size:12.5px;color:var(--knee);margin-top:8px;padding:9px 11px;
  background:rgba(251,146,60,.06);border-radius:7px;border-left:3px solid var(--knee);line-height:1.6;}
.ex-note{font-size:12.5px;color:var(--text);margin-top:8px;padding:9px 11px;
  background:var(--surface2);border-radius:7px;border-left:3px solid var(--lime);}

/* Video field */
.video-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
.video-input{flex:1;min-width:0;font-size:12.5px;padding:7px 9px;
  border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);}
.video-link{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);
  text-decoration:none;border:1px solid var(--accent);border-radius:6px;padding:6px 9px;
  letter-spacing:.03em;white-space:nowrap;}
.video-saved{font-size:11px;color:var(--lime);}

/* Knee scale */
.knee-box{margin-top:10px;padding:10px 12px;background:rgba(251,146,60,.08);
  border:1px solid rgba(251,146,60,.35);border-radius:8px;}
.knee-title{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;
  color:var(--knee);font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.knee-btns{display:flex;gap:6px;flex-wrap:wrap;}
.knee-btn{padding:5px 9px;border-radius:6px;font-size:11.5px;font-weight:700;
  border:1px solid var(--border);background:var(--surface2);color:var(--faint);cursor:pointer;transition:all .12s;}
.knee-warning{font-size:12px;color:var(--knee);margin-top:8px;line-height:1.5;}

/* Log table */
.log-section{margin-top:14px;}
.log-table{width:100%;border-collapse:collapse;min-width:280px;}
.log-th{padding:4px 6px;font-size:11px;color:var(--faint);text-align:left;font-weight:600;}
.log-tr{border-top:1px solid #1f1f1f;}
.log-td{padding:6px;}
.log-num{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--dim);}
.log-input{width:60px;padding:6px 7px;font-size:13px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface2);color:var(--text);}
.log-input.wide{width:70px;}
.log-comment{width:100%;margin-top:8px;font-size:12.5px;padding:9px;min-height:44px;
  border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--text);resize:vertical;}

/* Done button */
.done-btn{font-size:12.5px;padding:9px 16px;border-radius:6px;font-weight:700;
  font-family:'JetBrains Mono',monospace;letter-spacing:.04em;text-transform:uppercase;
  white-space:nowrap;cursor:pointer;transition:all .15s;}
.done-btn.undone{border:1px solid var(--lime);background:transparent;color:var(--lime);}
.done-btn.done{border:1px solid var(--lime);background:var(--lime);color:#0a0a0a;}
.session-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:16px;}

/* Progression note */
.prog-note{margin-top:22px;padding:14px 16px;background:var(--surface);
  border:1px dashed var(--border);border-radius:10px;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.stat-card.full{grid-column:1/-1;}
.stat-num{font-size:32px;font-weight:800;line-height:1;font-family:system-ui,sans-serif;}
.stat-label{font-size:12px;color:var(--dim);margin-top:4px;}
.block-bar{height:6px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-top:8px;}
.block-bar-fill{height:100%;background:var(--accent);border-radius:3px;}

/* Guide */
.guide-hero{background:var(--lime);color:#0a0a0a;border-radius:12px;padding:20px 18px;margin-bottom:18px;}
.guide-hero h2{font-size:19px;font-weight:800;margin-bottom:6px;font-family:system-ui,sans-serif;}
.guide-hero p{font-size:13.5px;line-height:1.6;opacity:.85;}
.accordion{margin-bottom:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface);overflow:hidden;}
.acc-header{width:100%;text-align:left;padding:14px 16px;background:transparent;border:none;
  display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:700;
  color:var(--text);cursor:pointer;}
.acc-toggle{color:var(--accent);font-size:18px;font-family:'JetBrains Mono',monospace;}
.acc-body{padding:0 16px 16px;font-size:13.5px;line-height:1.7;color:var(--dim);display:none;}
.acc-body.open{display:block;}
.acc-body table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px;}
.acc-body th{padding:8px;text-align:left;border:1px solid var(--border);background:var(--surface2);font-weight:600;color:var(--text);}
.acc-body td{padding:8px;border:1px solid var(--border);}
.acc-body ul,.acc-body ol{padding-left:18px;margin-top:4px;}
.acc-body li{margin-bottom:4px;}
.acc-body strong{color:var(--text);}
.acc-body code{background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:12px;}
.config-box{margin-bottom:18px;padding:14px 16px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;}
.config-label{font-size:12.5px;color:var(--dim);margin-bottom:6px;display:block;}
.config-input{padding:8px 10px;font-size:13.5px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface2);color:var(--text);}

/* Header btn styles */
.hbtn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 12px;border-radius:6px;
  letter-spacing:.06em;white-space:nowrap;cursor:pointer;transition:all .12s;}
.hbtn-lime{border:1px solid var(--lime);background:transparent;color:var(--lime);}
.hbtn-dim{border:1px solid var(--border);background:transparent;color:var(--dim);}

/* Student name */
#student-name-display{color:var(--accent);cursor:pointer;border-bottom:1px dashed var(--accent);font-size:inherit;}
#student-name-input{font-size:19px;font-weight:700;color:var(--accent);background:var(--surface);
  border:1px solid var(--accent);border-radius:5px;padding:2px 8px;text-transform:uppercase;
  min-width:160px;display:none;}
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div style="flex:1 1 auto;min-width:200px;">
      <div class="display" style="font-size:19px;font-weight:700;display:flex;flex-wrap:wrap;align-items:center;gap:8px;">
        <span>PLAN PERSONALIZADO</span>
        <span id="student-name-display" onclick="startEditName()"></span>
        <input id="student-name-input" type="text" placeholder="NOMBRE" onblur="commitName()" onkeydown="if(event.key==='Enter')commitName()"/>
      </div>
      <div class="mono" id="header-meta">PLAN DE PREPARACIÓN · <span id="date-range">—</span></div>
    </div>
    <div id="header-btns">
      <button class="hbtn hbtn-lime" onclick="exportProgress()">⬇ EXPORTAR PROGRESO</button>
      <button class="hbtn hbtn-dim" onclick="triggerImport()">⬆ IMPORTAR</button>
      <input id="import-file" type="file" accept=".json,application/json" style="display:none" onchange="handleImport(event)"/>
      <button class="hbtn hbtn-dim" onclick="resetAll()">REINICIAR DATOS</button>
    </div>
  </div>
  <div id="import-msg"></div>
  <div id="progress-bar-wrap">
    <div id="progress-label">
      <div class="mono" style="font-size:11px;color:var(--faint);letter-spacing:.1em;">PROGRESO DEL PLAN</div>
      <div class="mono" style="font-size:13px;font-weight:700;"><span id="completed-count" style="color:var(--lime);">0</span><span style="color:var(--faint);"> / 12 SEMANAS</span></div>
    </div>
    <div id="progress-segs" class="prog-segs"></div>
  </div>
  <div id="main-tabs">
    <button class="tab-btn active" data-tab="plan" onclick="switchTab('plan')">Plan</button>
    <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')">Stats</button>
    <button class="tab-btn" data-tab="guia" onclick="switchTab('guia')">Guía</button>
  </div>
</div>

<div id="content"></div>

<script>
'use strict';

/* ============================================================
   STORAGE
   ============================================================ */
const PREFIX = 'piernas12_';

function storageGet(key, fallback) {
  try { const v = localStorage.getItem(PREFIX + key); return v !== null ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function storageSet(key, val) {
  try { localStorage.setItem(PREFIX + key, JSON.stringify(val)); } catch(e) {}
}

/* ============================================================
   GITHUB VIDEOS — lee videos.json del repositorio y lo actualiza
   El token se incrusta en el HTML — solo el coach tiene este archivo
   ============================================================ */
const GH_USER  = 'martinmamchur';
const GH_REPO  = 'PlanOnline-Victoria';
const GH_FILE  = 'videos.json';
const GH_TOKEN = 'PEGAR_TOKEN_AQUI'; // <-- pegá tu token acá antes de subir a GitHub

async function ghGetVideos() {
  try {
    // Intentar leer videos.json del repositorio público (no requiere token)
    const url = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${GH_FILE}?t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.json();
  } catch(e) { return null; }
}

async function ghSaveVideos(videos) {
  if (!GH_TOKEN || GH_TOKEN === 'PEGAR_TOKEN_AQUI') return false;
  try {
    const apiUrl = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;
    // Primero obtener el SHA actual del archivo (necesario para actualizarlo)
    const headers = {
      'Authorization': `token ${GH_TOKEN}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    };
    let sha = null;
    try {
      const getRes = await fetch(apiUrl, { headers });
      if (getRes.ok) { const data = await getRes.json(); sha = data.sha; }
    } catch(e) {}

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(videos, null, 2))));
    const body = { message: 'Actualizar videos', content, ...(sha ? { sha } : {}) };
    const putRes = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    return putRes.ok;
  } catch(e) { return false; }
}

/* ============================================================
   PROGRAM DATA
   ============================================================ */
const MESOCYCLES = [
  { id:'m1', name:'Bloque 1', subtitle:'Reconstrucción técnica', weeks:[1,2,3,4], focus:'Patrones nuevos y base de volumen · RIR 3→2' },
  { id:'m2', name:'Bloque 2', subtitle:'Intensificación', weeks:[5,6,7,8], focus:'Superseries y mayor densidad · RIR 2→1' },
  { id:'m3', name:'Bloque 3', subtitle:'Pico estético-fuerza', weeks:[9,10,11,12], focus:'Myo-reps, drop sets y tempo · RIR 1→0' },
];

function ex(name, sets, reps, rir, rest, opts) {
  return { name, sets, reps, rir, rest, ...(opts||{}) };
}

// ── BLOQUE 1 ──────────────────────────────────────────────
const m1 = [

    dayLabel:'Lunes', dayFocus:'Glúteo + Femoral dominante',
    blockB:[

      ex('Elevación lateral con mancuerna',3,'15','RIR 1-2','45 seg'),

      ex('Face pull en polea',3,'15','RIR 1','45 seg'),
    ],
  },

    dayLabel:'Miércoles', dayFocus:'Cuádriceps + Glúteo dominante',
    blockB:[
      ex('Sentadilla hack',4,'8-10','RIR 3','2 min'),
      ex('Prensa de cuádriceps (pies bajos)',4,'10-12','RIR 3','90 seg',{kneeAlert:true}),
    ],
    blockC:[

    dayLabel:'Viernes', dayFocus:'Pierna completa',
    blockB:[

      ex('Zancada caminando c/mancuernas',3,'10 c/lado','RIR 2','75 seg',{kneeAlert:true}),
    ],
    blockC:[

      ex('Gemelos sentada en máquina',3,'15-20','RIR 1','45 seg'),
    ],
  },
];

// ── BLOQUE 2 ──────────────────────────────────────────────
const m2 = [
  { dayLabel:'Lunes', dayFocus:'Glúteo + Femoral dominante (superserie)',
    blockB:[
      ex('Peso muerto sumo c/barra',4,'6-8','RIR 2','2 min'),
      ex('Hip thrust c/barra',4,'10','RIR 2','90 seg'),
    ],
    blockC:[

      ex('SS A2: Patada de glúteo en polea',3,'15 c/lado','RIR 1','60 seg tras la pareja'),
      ex('Sentadilla búlgara c/mancuernas (tempo lento)',3,'10 c/lado','RIR 1-2','75 seg',{kneeAlert:true, notes:'Bajada de 3 segundos en cada repetición.'}),
      ex('Gemelos de pie en máquina',3,'15-20','RIR 1','45 seg'),
    ],
  },
  { dayLabel:'Martes', dayType:'upper', dayFocus:'Tren superior — Empuje (superserie)',
    blockB:[
      ex('Press inclinado con mancuernas',4,'8-10','RIR 2','90 seg'),
      ex('Press Arnold con mancuernas',4,'10','RIR 2','90 seg'),
    ],
    blockC:[
      ex('SS A1: Aperturas en polea (cable fly)',3,'12-15','RIR 1','15 seg → enlazar'),
      ex('SS A2: Elevación lateral en polea',3,'15','RIR 1','60 seg tras la pareja'),

// Guardar un video en GitHub y en cache local
async function saveVideo(exName, url) {
  state.videos[exName] = url;
  storageSet('videos', state.videos);
  // Guardar en GitHub en background (no bloquea la UI)
  const ok = await ghSaveVideos(state.videos);
  if (!ok) {
    // Si falla GitHub, igual queda en localStorage como backup
    console.warn('No se pudo guardar en GitHub, queda en cache local');
  }
}

/* ============================================================
   COMPUTED
   ============================================================ */
function completedWeeks() {
  let count = 0;
  for (let w = 1; w <= 12; w++) {
    const nd = getSessions(w).length;
    let all = true;
    for (let d = 0; d < nd; d++) {
      if (!state.sessionDone[`w${w}_d${d}__done`]) { all = false; break; }
    }
    if (all) count++; else break;
  }
  return count;
}

function dateRange() {
  if (!state.planStart) return '—';
  const s = new Date(state.planStart + 'T00:00:00');
  if (isNaN(s.getTime())) return 'Fecha inválida';
  const e = new Date(s); e.setDate(e.getDate() + 84);
  const fmt = d => d.toLocaleDateString('es-ES',{month:'short',year:'numeric'}).toUpperCase().replace('.','');
  return fmt(s) + ' → ' + fmt(e);
}

/* ============================================================
   RENDER HELPERS
   ============================================================ */
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') el.className = v;
      else if (k.startsWith('on')) el[k.toLowerCase()] = v;
      else el.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(c));
    else if (c && c.nodeType) el.appendChild(c);
  }
  return el;
}

function pill(text, accent) {
  const s = h('span', {className: accent ? 'pill pill-accent' : 'pill'}, text);
  return s;
}

  const blockCard = h('div', {id:'block-card'},

}

  frag.appendChild(h('div', {className:'coach-note'},

  frag.appendChild(h('div', {className:'phase-label'}, 'Fase A — Calentamiento dinámico (5-8 min)'));

  var wuSlots = [
    { key:'mov1', label:'Movilidad 1' },
    { key:'mov2', label:'Movilidad 2' },
    { key:'mov3', label:'Movilidad 3' },
    { key:'mov4', label:'Movilidad 4' },
    { key:'core1', label:'Core 1' },
    { key:'core2', label:'Core 2' },
    { key:'core3', label:'Core 3' },
  ];

  wuSlots.forEach(function(slot) {
    var wuKey = 'w' + week + '_d' + dayIdx + '_WU_' + slot.key;

    labelEl.textContent = slot.label;

    iframeWrap.style.cssText = 'margin-top:8px;border-radius:8px;overflow:hidden;background:#000;display:none;position:relative;padding-top:56.25%;max-width:100%;';

    var iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;';
    iframe.setAttribute('allowfullscreen', '');
    iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');

      return function() {
        var raw = inp.value;
        var embedUrl = getEmbedUrl(raw);
        if (embedUrl) {
          ifr.src = embedUrl; wrap.style.display = 'block';
          if (isVertical(raw)) {
            wrap.style.paddingTop = '0'; wrap.style.height = '480px';
            wrap.style.maxWidth = '270px'; wrap.style.margin = '8px auto 0 auto';
            ifr.style.position = 'relative'; ifr.style.height = '480px';
          } else {
            wrap.style.paddingTop = '56.25%'; wrap.style.height = '';
            wrap.style.maxWidth = '100%'; wrap.style.margin = '8px 0 0 0';

          }

    vidInput.addEventListener('input', function() {

    h('p', {style:'font-size:13.5px;line-height:1.6;color:var(--dim)'}, PROG_NOTES[week])
  ));

  return frag;
}

/* ============================================================
   VIDEO EMBED HELPERS — funciones globales accesibles desde
   Fase A (calentamiento) y Fase B/C (ejercicios principales)
   ============================================================ */
function getEmbedUrl(raw) {
  if (!raw) return null;
  var url = raw.trim();
  var vimeoMatch = url.match(/vimeo\.com\/(?:video\/)?([0-9]+)/);
  if (vimeoMatch) return 'https://player.vimeo.com/video/' + vimeoMatch[1] + '?title=0&byline=0&portrait=0';
  var ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  if (ytMatch) return 'https://www.youtube.com/embed/' + ytMatch[1] + '?rel=0';
  return null;
}
function isVertical(raw) {
  if (!raw) return false;
  return raw.includes('/shorts/') || raw.includes('shorts');
}

function renderExCard(week, dayIdx, phase, idx, exObj) {
  const dayKey = `w${week}_d${dayIdx}_${phase}`;
  const logKey = `${dayKey}__log${idx}`;
  const vidKey = `${dayKey}__ex${idx}__${exObj.name.replace(/[^a-zA-Z0-9]+/g,'-').toLowerCase()}`;
  const entry = state.logData[logKey] || { sets:[], comment:'', kneeSensation: null };
  const numSets = typeof exObj.sets === 'number' ? exObj.sets : 1;
  const setsArr = entry.sets.length === numSets ? entry.sets : Array.from({length:numSets},(_,i)=>entry.sets[i]||{kg:'',reps:''});

  const card = h('div', {className:'ex-card ' + (exObj.kneeAlert ? 'knee' : 'normal')});

  // Header
  const top = h('div', {className:'ex-top'});
  const nameWrap = h('div', {className:'ex-name'});
  if (exObj.kneeAlert) nameWrap.appendChild(document.createTextNode('🦴 '));
  // Nombre editable — se guarda en logData con clave __name
  const nameKey = logKey + '__name';
  const savedName = (state.logData[nameKey] && state.logData[nameKey].v) || exObj.name;
  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.value = savedName;
  nameInput.style.cssText = 'background:transparent;border:none;border-bottom:1px dashed var(--faint);color:var(--text);font-weight:700;font-size:15.5px;width:100%;outline:none;padding:2px 0;min-width:0;';
  nameInput.addEventListener('input', function() {
    state.logData[nameKey] = { v: nameInput.value }; save();
  });
  nameWrap.appendChild(nameInput);
  top.appendChild(nameWrap);
  const pills = h('div', {className:'ex-pills'});
  pills.appendChild(pill(`${exObj.sets} ${exObj.sets===1?'bloque':'series'}`));
  pills.appendChild(pill(exObj.reps));
  pills.appendChild(pill(exObj.rir, true));
  top.appendChild(pills);
  card.appendChild(top);
  card.appendChild(h('div', {className:'ex-rest'}, 'Descanso: ' + exObj.rest));

  // Knee note
  if (exObj.kneeAlert) {
    card.appendChild(h('div', {className:'ex-note-knee'},
      h('strong', null, 'Rodilla: '), getKneeNote(exObj.name)
    ));
  }
  // General note
  if (exObj.notes) {
    card.appendChild(h('div', {className:'ex-note'}, exObj.notes));
  }

  // Video field
  // ── VIDEO EMBEBIDO ── (getEmbedUrl e isVertical son funciones globales)
  var vidWrap = document.createElement('div');
  vidWrap.style.cssText = 'margin-top:10px;';

  var vidInputRow = document.createElement('div');
  vidInputRow.style.cssText = 'display:flex;align-items:center;gap:6px;';

  var vidInput = document.createElement('input');
  vidInput.type = 'text';
  vidInput.className = 'video-input';
  vidInput.placeholder = 'Pegar link de YouTube o Vimeo...';
  vidInput.value = state.videos[vidKey] || '';

  var savedSpan = document.createElement('span');
  savedSpan.className = 'video-saved';
  savedSpan.style.display = 'none';
  savedSpan.textContent = '✓';

  var iframeWrap = document.createElement('div');
  // Aspect ratio inicial: se ajusta dinámicamente según si el video es vertical u horizontal
  // Vertical (9:16) = padding-top 177.78% | Horizontal (16:9) = padding-top 56.25%
  iframeWrap.style.cssText = 'margin-top:8px;border-radius:8px;overflow:hidden;background:#000;display:none;position:relative;padding-top:56.25%;max-width:100%;';

  var iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;';
  iframe.setAttribute('allowfullscreen', '');
  iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
  iframeWrap.appendChild(iframe);

  function updateEmbed() {
    var raw = vidInput.value;
    var embedUrl = getEmbedUrl(raw);
    if (embedUrl) {
      iframe.src = embedUrl;
      iframeWrap.style.display = 'block';
      // Ajustar el aspect ratio según orientación del video
      // Videos verticales: limitamos el ancho para que no quede un iframe altísimo
      // Usamos max-width del 45% del contenedor y padding-top 177.78% (9:16)
      if (isVertical(raw)) {
        iframeWrap.style.paddingTop = '0';
        iframeWrap.style.height = '480px';
        iframeWrap.style.maxWidth = '270px';
        iframeWrap.style.margin = '8px auto 0 auto';
        iframe.style.position = 'relative';
        iframe.style.height = '480px';
        iframe.style.width = '100%';
        iframe.style.top = '0';
        iframe.style.left = '0';
      } else {
        // Horizontal 16:9
        iframeWrap.style.paddingTop = '56.25%';
        iframeWrap.style.height = '';
        iframeWrap.style.maxWidth = '100%';
        iframeWrap.style.margin = '8px 0 0 0';
        iframe.style.position = 'absolute';
        iframe.style.height = '100%';
        iframe.style.width = '100%';
        iframe.style.top = '0';
        iframe.style.left = '0';
      }
    } else {
      iframe.src = '';
      iframeWrap.style.display = 'none';
    }
  }

  vidInput.addEventListener('input', function() {
    const exName = vidKey; // usamos vidKey como identificador
    saveVideo(exName, vidInput.value); // guarda en GitHub + localStorage
    savedSpan.style.display = 'inline';
    setTimeout(function() { savedSpan.style.display = 'none'; }, 1200);
    updateEmbed();
  });

  updateEmbed();

  vidInputRow.appendChild(vidInput);
  vidInputRow.appendChild(savedSpan);
  vidWrap.appendChild(vidInputRow);
  vidWrap.appendChild(iframeWrap);
  card.appendChild(vidWrap);

  // Knee scale (only if kneeAlert)
  if (exObj.kneeAlert) {
    const kbox = h('div', {className:'knee-box'});
    kbox.appendChild(h('div', {className:'knee-title'}, '🦴 Sensación de rodilla hoy'));
    const kbtns = h('div', {className:'knee-btns'});
    KNEE_SCALE.forEach(k => {
      const btn = h('button', {className:'knee-btn'}, `${k.val} — ${k.label}`);
      const current = entry.kneeSensation;
      if (current === k.val) {
        btn.style.border = `2px solid ${k.color}`;
        btn.style.background = k.color + '22';
        btn.style.color = k.color;
      }
      btn.addEventListener('click', () => {
        const e2 = state.logData[logKey] || {sets:setsArr, comment:'', kneeSensation:null};
        e2.kneeSensation = k.val;
        state.logData[logKey] = e2;
        save();
        // Re-render just this card
        const newCard = renderExCard(week, dayIdx, phase, idx, exObj);
        card.replaceWith(newCard);
      });
      kbtns.appendChild(btn);
    });
    kbox.appendChild(kbtns);
    const cur = entry.kneeSensation;
    if (cur !== null && cur !== undefined && cur >= 3) {
      const msg = cur >= 5 ? 'Detené el ejercicio y anotá en comentarios. Avisale a tu entrenador.'
        : cur === 4 ? 'Reducí la carga al 70% o pasá a la regresión. Avisale hoy.'

  }

  const logSection = h('div', {className:'log-section'});

      state.logData[logKey] = e2;
      save();
    }
    kgInput.addEventListener('input', updateSet);
    repsInput.addEventListener('input', updateSet);
    tr.appendChild(h('td', {className:'log-td'}, kgInput));
    tr.appendChild(h('td', {className:'log-td'}, repsInput));
    table.appendChild(tr);
  });
  tableWrap.appendChild(table);
  logSection.appendChild(tableWrap);

  const comment = h('textarea', {className:'log-comment', placeholder:'Comentarios (sensación, dolor, energía, técnica...)'});
  comment.value = entry.comment || '';
  comment.addEventListener('input', () => {
    const e2 = state.logData[logKey] || {sets:[...setsArr], kneeSensation: entry.kneeSensation ?? null};
    e2.comment = comment.value;
    state.logData[logKey] = e2;
    save();
  });
  logSection.appendChild(comment);
  card.appendChild(logSection);

  return card;
}

/* ============================================================
   RENDER: STATS TAB
   ============================================================ */
function renderStats() {
  const c = document.getElementById('content');
  c.innerHTML = '';

  let totalSessions = 0;
  for (let w = 1; w <= 12; w++) totalSessions += getSessions(w).length;
  const doneCount = Object.values(state.sessionDone).filter(Boolean).length;
  const pct = totalSessions ? Math.round((doneCount/totalSessions)*100) : 0;
  const setsLogged = Object.values(state.logData).reduce((acc, e) => {
    if (!e || !e.sets) return acc;
    return acc + e.sets.filter(s => s && (s.kg || s.reps)).length;
  }, 0);

  const label = h('div', {className:'phase-label'}, 'Resumen general');
  c.appendChild(label);
  const grid = h('div', {className:'stats-grid'});

  const s1 = h('div', {className:'stat-card'});
  s1.appendChild(h('div', {className:'stat-num', style:'color:var(--accent)'}, doneCount));
  s1.appendChild(h('div', {className:'stat-label'}, `de ${totalSessions} sesiones completadas`));
  grid.appendChild(s1);

  const s2 = h('div', {className:'stat-card'});
  s2.appendChild(h('div', {className:'stat-num', style:'color:var(--lime)'}, pct + '%'));
  s2.appendChild(h('div', {className:'stat-label'}, 'del plan total avanzado'));
  grid.appendChild(s2);

  const s3 = h('div', {className:'stat-card full'});
  s3.appendChild(h('div', {className:'stat-num', style:'color:var(--text)'}, setsLogged));
  s3.appendChild(h('div', {className:'stat-label'}, 'series registradas con datos (kg / reps)'));
  grid.appendChild(s3);
  c.appendChild(grid);

  const label2 = h('div', {className:'phase-label'}, 'Avance por bloque');
  c.appendChild(label2);

  MESOCYCLES.forEach(m => {
    const sessInBlock = m.weeks.reduce((acc, w) => acc + getSessions(w).length, 0);
    const doneInBlock = m.weeks.reduce((acc, w) => {
      const nd = getSessions(w).length;
      let cnt = 0;
      for (let d = 0; d < nd; d++) { if (state.sessionDone[`w${w}_d${d}__done`]) cnt++; }
      return acc + cnt;
    }, 0);
    const bpct = Math.round((doneInBlock/sessInBlock)*100);
    const card = h('div', {className:'stat-card', style:'margin-bottom:10px'});
    const row = h('div', {style:'display:flex;justify-content:space-between;margin-bottom:8px'});
    row.appendChild(h('div', {style:'font-weight:700;font-size:14px'}, m.name + ' · ' + m.subtitle));
    row.appendChild(h('div', {className:'mono', style:'font-size:12px;color:var(--dim)'}, `${doneInBlock}/${sessInBlock}`));
    card.appendChild(row);
    const bar = h('div', {className:'block-bar'});
    bar.appendChild(h('div', {className:'block-bar-fill', style:`width:${bpct}%`}));
    card.appendChild(bar);
    c.appendChild(card);
  });

  c.appendChild(h('div', {style:'margin-top:18px;padding:14px 16px;background:var(--surface);border:1px dashed var(--border);border-radius:10px;font-size:13px;color:var(--dim);line-height:1.6'},
    'Estas cifras reflejan lo que marcaste como completado y los datos que registraste en cada serie. Usálas para ver tu constancia semana a semana — lo que importa es la tendencia a lo largo de las 12 semanas.'
  ));
}

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
function exportProgress() {
  var payload = {
    app: 'plan-piernas-12-semanas-victoria',
    exportedAt: new Date().toISOString(),
    studentName: state.studentName,
    planStart: state.planStart,
    logData: state.logData,
    videos: state.videos,
    sessionDone: state.sessionDone,
  };
  try {
    var json = JSON.stringify(payload, null, 2);
    var blob = new Blob([json], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var safeName = (state.studentName||'alumna').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
    a.href = url;
    a.download = 'progreso-' + safeName + '-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 2000);
  } catch(e) {
    alert('No se pudo generar el archivo. Abrí el plan en Safari e intentá de nuevo.');
  }
}
function triggerImport() {
  showImportMsg('', '');
  document.getElementById('import-file').click();
}
function handleImport(e) {
  var file = e.target.files && e.target.files[0];
  e.target.value = '';
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var parsed = JSON.parse(ev.target.result);
      if (!parsed || !('logData' in parsed) || !('sessionDone' in parsed)) {
        showImportMsg('Este archivo no tiene el formato esperado de un export de este plan.', 'err'); return;
      }
      var name = parsed.studentName ? ' de "' + parsed.studentName + '"' : '';
      var date = parsed.exportedAt ? ' (' + new Date(parsed.exportedAt).toLocaleDateString('es-ES') + ')' : '';
      if (!confirm('Vas a reemplazar los datos actuales con los del archivo' + name + date + '. ¿Continuar?')) return;
      state.logData = parsed.logData || {};
      state.videos = parsed.videos || {};
      state.sessionDone = parsed.sessionDone || {};
      if (parsed.studentName) state.studentName = parsed.studentName;
      if (parsed.planStart) state.planStart = parsed.planStart;
      save(); renderHeader(); switchTab(state.tab);
      showImportMsg('Progreso importado correctamente.', 'ok');
    } catch(err) {
      showImportMsg('No se pudo leer el archivo. Asegurate de que sea el .json exportado desde este plan.', 'err');
    }
  };
  reader.readAsText(file);
}

function showImportMsg(text, type) {
  const el = document.getElementById('import-msg');
  el.textContent = text;
  el.className = text ? type : '';
}
function resetAll() {
  if (!confirm('Esto borrará todo el registro guardado (series, videos, sesiones completadas y nombre). ¿Seguro?')) return;
  state.logData = {}; state.videos = {}; state.sessionDone = {};
  state.studentName = 'Victoria'; state.planStart = '';
  save(); renderHeader(); switchTab('plan');
}

/* ============================================================
   BOOT
   ============================================================ */
function _showError(msg, detail) {
  var c = document.getElementById('content');
  if (!c) return;
  c.innerHTML = '<div style="padding:20px;color:#ff4426;font-family:monospace;font-size:13px;line-height:1.6">'
    + '<div style="font-size:16px;font-weight:bold;margin-bottom:12px">⚠️ Error al cargar</div>'
    + '<div style="margin-bottom:8px">' + msg + '</div>'
    + (detail ? '<div style="background:#1d1d1d;padding:10px;border-radius:6px;margin-top:8px;font-size:11px;color:#9a9a96;word-break:break-all">' + detail + '</div>' : '')
    + '</div>';
}

async function _boot() {
  // Cargar videos desde GitHub (fuente de verdad del coach)
  // Si falla (sin internet), usa el cache local de localStorage
  try {
    const ghVideos = await ghGetVideos();
    if (ghVideos && typeof ghVideos === 'object') {
      state.videos = ghVideos;
      storageSet('videos', ghVideos);
    }
  } catch(e) { /* usa cache local */ }

  try {
    renderHeader();
  } catch(e) {
    _showError('Error en renderHeader: ' + e.message, e.stack ? e.stack.split('\n').slice(0,4).join(' | ') : '');
    return;
  }
  try {
    renderPlan();
  } catch(e) {
    _showError('Error en renderPlan: ' + e.message, e.stack ? e.stack.split('\n').slice(0,4).join(' | ') : '');
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() { _boot(); });
} else {
  _boot();
}
</script>
